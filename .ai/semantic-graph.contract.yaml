      - database
    valid_from: "2026-05-17"
    valid_until: null
relations:
  - id: rel-svc-owns-parser
    from: service-costguard
    to: module-transcript-parser
    type: owns
    confidence: 1.0
  - id: rel-svc-owns-budget
    from: service-costguard
    to: module-budget-engine
    type: owns
    confidence: 1.0
  - id: rel-budget-calls-alert
    from: module-budget-engine
    to: module-alert-emitter
