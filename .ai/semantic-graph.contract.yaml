      - jsonl
      - parser
      - token
    valid_from: "2026-05-17"
    valid_until: null
  - id: module-budget-engine
    kind: module
    name: Budget Engine
    qualified_name: costguard.budget
    file: src/costguard/budget.py
    confidence: 1.0
    description: Manages budget thresholds and cost accumulation per session/project.
    tags:
      - budget
      - cost-accumulation
      - threshold
    valid_from: "2026-05-17"
    valid_until: null
  - id: module-alert-emitter
    kind: module
    name: Alert Emitter
    qualified_name: costguard.alert
    file: src/costguard/alert.py
    confidence: 1.0
    description: Emits alerts when budget thresholds are breached.
