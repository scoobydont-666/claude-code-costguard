      - cost-tracking
      - budget
      - cli
    valid_from: "2026-05-17"
    valid_until: null
  - id: module-transcript-parser
    kind: module
    name: Transcript Parser
    qualified_name: costguard.parser
    file: src/costguard/parser.py
    confidence: 1.0
    description: Parses JSONL transcripts to extract token usage data.
